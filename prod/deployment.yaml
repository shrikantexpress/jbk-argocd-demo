apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app-prod
  namespace: prod
spec:
  replicas: 5          # 👈 Higher replicas for prod
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Namespace
metadata:
  name: prod
